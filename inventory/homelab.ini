# Individual hosts
[login]
login ansible_host=10.0.0.71

[storage]
storage ansible_host=10.0.0.250

[control]
control ansible_host=10.0.0.246

[workers]
worker1 ansible_host=10.0.0.236
worker2 ansible_host=10.0.0.19
worker3 ansible_host=10.0.0.116

[webservers]
web1 ansible_host=10.0.0.104

# K8s logical grouping
[k8s_control_plane:children]
control

[k8s_workers:children]
workers

[k8s_cluster:children]
k8s_control_plane
k8s_workers

# OS groupings
[rhel10:children]
login
storage
control
webservers

[rhel9:children]
workers

# Functional groupings
[compute:children]
workers

[infrastructure:children]
login
storage
control

# Group variables
[rhel10:vars]
ansible_python_interpreter=/usr/bin/python3

[rhel9:vars]
ansible_python_interpreter=/usr/bin/python3

[workers:vars]
worker_type=compute
max_cpu_threshold=80

[webservers:vars]
http_port=80
https_port=443

[k8s_cluster:vars]
k8s_version=1.32
pod_network_cidr=10.244.0.0/16
