---
- name: Install FreeIPA client packages (RHEL/CentOS)
  ansible.builtin.dnf:
    name:
      - freeipa-client
      - oddjob
      - oddjob-mkhomedir
      - sssd
      - sssd-ipa
    state: present
  when: ansible_os_family == "RedHat"

- name: Install FreeIPA client packages (Ubuntu)
  ansible.builtin.apt:
    name:
      - freeipa-client
      - sssd
      - sssd-ipa
      - libpam-sss
      - libnss-sss
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Check if already enrolled
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: ipa_enrolled

- name: Enroll host in FreeIPA domain
  ansible.builtin.command:
    cmd: >
      ipa-client-install
      --unattended
      --domain={{ ipa_domain }}
      --realm={{ ipa_realm }}
      --server={{ ipa_server_fqdn }}
      --principal=admin
      --password={{ ipa_admin_password }}
      --mkhomedir
      --no-ntp
  when: not ipa_enrolled.stat.exists
  notify: restart sssd

- name: Enable home directory creation on login (RHEL)
  ansible.builtin.command: authselect enable-feature with-mkhomedir
  when:
    - ansible_os_family == "RedHat"
    - not ipa_enrolled.stat.exists
