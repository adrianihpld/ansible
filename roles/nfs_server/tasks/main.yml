---
- name: Install NFS server
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
    update_cache: true

- name: Create home directory export path
  ansible.builtin.file:
    path: "{{ nfs_home_export }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure NFS exports
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: "0644"
  notify: reload nfs exports

- name: Enable and start NFS server
  ansible.builtin.service:
    name: nfs-kernel-server
    state: started
    enabled: true
